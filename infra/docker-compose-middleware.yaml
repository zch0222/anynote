name: ${COMPOSE_PROJECT_NAME:-anynote}

x-health-defaults: &health-defaults
  interval: 10s
  timeout: 5s
  retries: 20
  start_period: 20s

services:
  mysql:
    image: mysql:${MYSQL_VERSION:-8.0.42}
    container_name: anynote-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-AnynoteRoot123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-anynote}
      MYSQL_USER: ${MYSQL_APP_USER:-anynote}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD:-Anynote*1832}
      MYSQL_APP_USER: ${MYSQL_APP_USER:-anynote}
      MYSQL_APP_PASSWORD: ${MYSQL_APP_PASSWORD:-Anynote*1832}
      NACOS_DB_NAME: ${NACOS_DB_NAME:-anynote_config}
      XXL_JOB_DB_NAME: ${XXL_JOB_DB_NAME:-anynote_xxl_job}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      <<: *health-defaults
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
    networks:
      - anynote-net

  redis:
    image: redis:${REDIS_VERSION:-6.2-alpine}
    container_name: anynote-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TZ: Asia/Shanghai
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        fi
        exec redis-server --appendonly yes
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      <<: *health-defaults
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG; else redis-cli ping | grep PONG; fi"]
    networks:
      - anynote-net

  nacos:
    image: nacos/nacos-server:${NACOS_VERSION:-v2.4.3}
    container_name: anynote-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: ${NACOS_DB_NAME:-anynote_config}
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-AnynoteRoot123}
      MYSQL_SERVICE_DB_PARAM: characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${NACOS_HTTP_PORT:-8848}:8848"
      - "127.0.0.1:${NACOS_GRPC_PORT:-9848}:9848"
      - "127.0.0.1:${NACOS_RAFT_PORT:-9849}:9849"
    volumes:
      - nacos-logs:/home/nacos/logs
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      <<: *health-defaults
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/v1/console/health/readiness >/dev/null"]
    networks:
      - anynote-net

  nacos-init:
    image: curlimages/curl:${CURL_VERSION:-8.10.1}
    container_name: anynote-nacos-init
    entrypoint:
      - /bin/sh
      - /docker/nacos/nacos-init.sh
    environment:
      NACOS_ADDR: http://nacos:8848
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-0587fa28-1301-43db-a7a1-599c00fc3f70}
      NACOS_GROUP: ${NACOS_GROUP:-DEFAULT_GROUP}
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
      NACOS_CONFIG_DIR: /docker/nacos/configs
    volumes:
      - ./docker/nacos:/docker/nacos:ro
    depends_on:
      nacos:
        condition: service_healthy
    restart: "no"
    networks:
      - anynote-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION:-8.7.0}
    container_name: anynote-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.ml.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms384m -Xmx384m -XX:MaxDirectMemorySize=128m}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${ELASTICSEARCH_PORT:-9200}:9200"
      - "127.0.0.1:${ELASTICSEARCH_TRANSPORT_PORT:-9300}:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      <<: *health-defaults
      # ES 8.x 冷启动较慢，给足 start_period，避免上层应用过早 depends_on 失败
      start_period: 90s
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null"]
    networks:
      - anynote-net

  rocketmq-namesrv:
    image: apache/rocketmq:${ROCKETMQ_VERSION:-5.3.0}
    container_name: anynote-rocketmq-namesrv
    command: sh mqnamesrv
    environment:
      JAVA_OPT_EXT: -Xms256m -Xmx256m -Xmn128m
      TZ: Asia/Shanghai
    ports:
      - "${ROCKETMQ_BROKER_BIND_IP:-127.0.0.1}:${ROCKETMQ_NAMESRV_PORT:-9876}:9876"
    volumes:
      - rocketmq-namesrv-logs:/home/rocketmq/logs
    healthcheck:
      <<: *health-defaults
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/9876'"]
    networks:
      - anynote-net

  rocketmq-broker:
    image: apache/rocketmq:${ROCKETMQ_VERSION:-5.3.0}
    container_name: anynote-rocketmq-broker
    user: root
    environment:
      JAVA_OPT_EXT: ${ROCKETMQ_BROKER_JAVA_OPT_EXT:--Xms256m -Xmx256m -Xmn128m -XX:MaxDirectMemorySize=128m}
      # broker 注册到 namesrv 的可达地址（brokerIP1）
      # 必须是其他容器/客户端能解析并连通的地址，默认走 docker service 名
      ROCKETMQ_BROKER_ADVERTISE_IP: ${ROCKETMQ_BROKER_ADVERTISE_IP:-rocketmq-broker}
      brokerIP1: ${ROCKETMQ_BROKER_ADVERTISE_IP:-rocketmq-broker}
      TZ: Asia/Shanghai
    command:
      - sh
      - -c
      - |
        cat > /tmp/broker.conf <<EOF
        brokerClusterName=DefaultCluster
        brokerName=broker-a
        brokerId=0
        namesrvAddr=rocketmq-namesrv:9876
        brokerIP1=$${ROCKETMQ_BROKER_ADVERTISE_IP}
        listenPort=10911
        autoCreateTopicEnable=true
        autoCreateSubscriptionGroup=true
        storePathRootDir=/home/rocketmq/store
        storePathCommitLog=/home/rocketmq/store/commitlog
        flushDiskType=ASYNC_FLUSH
        EOF
        exec sh mqbroker -n rocketmq-namesrv:9876 -c /tmp/broker.conf
    ports:
      - "${ROCKETMQ_BROKER_BIND_IP:-127.0.0.1}:${ROCKETMQ_BROKER_FAST_PORT:-10909}:10909"
      - "${ROCKETMQ_BROKER_BIND_IP:-127.0.0.1}:${ROCKETMQ_BROKER_PORT:-10911}:10911"
      - "${ROCKETMQ_BROKER_BIND_IP:-127.0.0.1}:${ROCKETMQ_BROKER_HA_PORT:-10912}:10912"
    volumes:
      - rocketmq-broker-logs:/home/rocketmq/logs
      - rocketmq-broker-store:/home/rocketmq/store
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    healthcheck:
      <<: *health-defaults
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/10911'"]
    networks:
      - anynote-net

  logstash:
    image: docker.elastic.co/logstash/logstash:${LOGSTASH_VERSION:-8.7.0}
    container_name: anynote-logstash
    environment:
      LS_JAVA_OPTS: -Xms256m -Xmx512m
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${LOGSTASH_TCP_PORT:-4560}:4560"
      - "127.0.0.1:${LOGSTASH_BEATS_PORT:-5044}:5044"
      - "127.0.0.1:${LOGSTASH_API_PORT:-9600}:9600"
    volumes:
      - ./docker/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./docker/logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - logstash-data:/usr/share/logstash/data
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      <<: *health-defaults
      start_period: 60s
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9600 >/dev/null"]
    networks:
      - anynote-net

  minio:
    image: minio/minio:${MINIO_VERSION:-latest}
    container_name: anynote-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-anynote}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-AnynoteMinio123}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:${MINIO_CONSOLE_PORT:-9001}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      <<: *health-defaults
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
    networks:
      - anynote-net

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:${XXL_JOB_ADMIN_VERSION:-2.5.0}
    container_name: anynote-xxl-job-admin
    environment:
      PARAMS: >-
        --server.port=8080
        --spring.datasource.url=jdbc:mysql://mysql:3306/${XXL_JOB_DB_NAME:-anynote_xxl_job}?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
        --spring.datasource.username=root
        --spring.datasource.password=${MYSQL_ROOT_PASSWORD:-AnynoteRoot123}
        --xxl.job.accessToken=default_token
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${XXL_JOB_PORT:-10086}:8080"
    volumes:
      - xxl-job-logs:/data/applogs
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      <<: *health-defaults
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080'"]
    networks:
      - anynote-net

networks:
  anynote-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  nacos-logs:
  elasticsearch-data:
  rocketmq-namesrv-logs:
  rocketmq-broker-logs:
  rocketmq-broker-store:
  logstash-data:
  minio-data:
  xxl-job-logs:
