input {
  # 接收 Spring Boot 通过 logback-logstash-encoder 发送的 JSON 日志
  tcp {
    port  => 4560
    codec => json_lines
  }
  # 兼容 Filebeat / Beats 采集器
  beats {
    port => 5044
  }
}

filter {
  # 未注入 app_name 的日志默认标记为 unknown
  if [app_name] {
    # app_name 已存在，无需处理
  } else {
    mutate {
      add_field => { "app_name" => "unknown" }
    }
  }

  # 将 @timestamp 统一为 Asia/Shanghai 时区展示字段
  date {
    match       => ["timestamp", "yyyy-MM-dd HH:mm:ss.SSS", "ISO8601"]
    target      => "@timestamp"
    timezone    => "Asia/Shanghai"
    tag_on_failure => []
  }
}

output {
  elasticsearch {
    hosts    => "elasticsearch:9200"
    index    => "anynote-logs-%{[app_name]}-%{+YYYY.MM.dd}"
    # ES 8.x xpack.security disabled, no auth needed
  }
}
