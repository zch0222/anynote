# Anynote Nginx 反向代理配置示例
# 适用场景：前端容器 (:3000) + 后端网关 (:8080) 对外统一暴露 443/80
#
# 使用前替换：
#   YOUR_DOMAIN   → 实际域名，如 anynote.example.com
#   /path/to/cert → SSL 证书路径

upstream frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    ssl_certificate     /path/to/cert/fullchain.pem;
    ssl_certificate_key /path/to/cert/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 512M;

    # ----------------------------------------------------------------
    # SSE（Server-Sent Events）路由
    # 公共代理指令统一在 snippets/sse-common.conf
    # 新增 SSE 接口时：添加 location 并 `include snippets/sse-common.conf;`
    # ----------------------------------------------------------------

    # SSE — AI 流式接口
    # 涉及路由：
    #   POST /api/aiNio/chat/completions
    #   POST /api/aiNio/chat/completions/noConversation
    #   POST /api/aiNio/chat/moocVideoSummarize
    #   POST /api/aiNio/chat/noteTaskSubmissionAnalyze
    #   GET  /api/aiNio/whisper/status/{taskId}
    location /api/aiNio/ {
        include snippets/sse-common.conf;
    }

    # SSE — 实时通知接口
    # 涉及路由：
    #   GET /api/notify/notification  （用户消息推送，基于 Redis Pub/Sub + 心跳 10s）
    location = /api/notify/notification {
        include snippets/sse-common.conf;
    }

    # ----------------------------------------------------------------
    # WebSocket 预留配置（当前项目未使用，可按需启用）
    # 如有 WS 接口，取消注释并修改 location 路径
    # ----------------------------------------------------------------
    # location /ws/ {
    #     proxy_pass http://backend;
    #
    #     # WebSocket 升级握手
    #     proxy_http_version      1.1;
    #     proxy_set_header        Upgrade $http_upgrade;
    #     proxy_set_header        Connection "upgrade";
    #
    #     proxy_read_timeout      3600s;
    #     proxy_send_timeout      60s;
    #
    #     proxy_set_header        Host $host;
    #     proxy_set_header        X-Real-IP $remote_addr;
    #     proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header        X-Forwarded-Proto $scheme;
    # }

    # ----------------------------------------------------------------
    # 普通 API 接口 — /api/
    # ----------------------------------------------------------------
    location /api/ {
        proxy_pass              http://backend;
        proxy_http_version      1.1;
        proxy_set_header        Connection '';
        proxy_read_timeout      60s;
        proxy_send_timeout      60s;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }

    # ----------------------------------------------------------------
    # 前端 Next.js 应用
    # ----------------------------------------------------------------
    location / {
        proxy_pass              http://frontend;
        proxy_http_version      1.1;
        proxy_set_header        Connection '';
        proxy_read_timeout      60s;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        # Next.js 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
            proxy_pass          http://frontend;
            expires             30d;
            add_header          Cache-Control "public, immutable";
        }
    }
}
