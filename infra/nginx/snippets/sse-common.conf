# Anynote SSE（Server-Sent Events）公共代理指令
# 适用：服务端长连接 + 持续推送（含心跳）的接口
# 用法：在 location 块中 `include snippets/sse-common.conf;`
#
# 关键约束：
#   1. proxy_buffering / proxy_cache / gzip 必须关闭，否则事件流被批量缓冲发送
#   2. proxy_read_timeout 必须大于业务侧最大心跳间隔（当前最长 10s 心跳）
#   3. add_header X-Accel-Buffering no 通知上游 nginx / CDN 不要缓冲
#   4. proxy_set_header Connection '' + proxy_http_version 1.1 保持长连接
#
# 部署提示：
#   - Debian/Ubuntu 标准布局：将本文件放至 /etc/nginx/snippets/sse-common.conf
#   - 自定义布局：调整 include 指令为绝对路径

proxy_pass              http://backend;
proxy_http_version      1.1;
proxy_set_header        Connection '';

# 关闭缓冲与压缩（SSE 必须）
proxy_buffering         off;
proxy_cache             off;
gzip                    off;

# 长连接 / 心跳
proxy_read_timeout      3600s;
proxy_send_timeout      60s;

# 通知上游 nginx / CDN 不要缓冲
add_header              X-Accel-Buffering no always;

# 标准转发头
proxy_set_header        Host                $host;
proxy_set_header        X-Real-IP           $remote_addr;
proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
proxy_set_header        X-Forwarded-Proto   $scheme;
